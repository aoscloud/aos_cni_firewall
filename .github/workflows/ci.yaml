name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      WSS_API_KEY: ${{ secrets.WSS_API_KEY }}
      WSS_CNI_FIREWALL_TOKEN: ${{ secrets.WSS_CNI_FIREWALL_TOKEN }}
      WSS_USER_KEY: ${{ secrets.WSS_USER_KEY }}
    steps:
    - uses: actions/checkout@v2
  
    - name: WhiteSource Unified Agent Scan      
      run: |
        echo Downloading WhiteSource Unified Agent
        curl -LJO https://unified-agent.s3.amazonaws.com/wss-unified-agent.jar
        if [[ "$(curl -sL https://unified-agent.s3.amazonaws.com/wss-unified-agent.jar.sha256)" != "$(sha256sum wss-unified-agent.jar)" ]] ; then
          echo "Integrity Check Failed"
        else
          echo "Integrity Check Passed"
          echo Starting WhiteSource Scan
          java -jar wss-unified-agent.jar -apiKey $WSS_API_KEY -projectToken $WSS_CNI_FIREWALL_TOKEN -userKey $WSS_USER_KEY -wss.url https://saas-eu.whitesourcesoftware.com/agent -scanComment $GITHUB_SHA
        fi